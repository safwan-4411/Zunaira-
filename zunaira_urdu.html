<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>زنیرا ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rose:  #c9647f;
      --blush: #f2c4ce;
      --cream: #fdf6f0;
      --plum:  #6b3050;
      --gold:  #d4a653;
      --mist:  #e8dde5;
    }

    body {
      background: var(--cream);
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    .petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .petal {
      position: absolute; top: -40px;
      width: 14px; height: 20px;
      background: radial-gradient(ellipse at 40% 30%, #f7b8c4, #d6748a);
      border-radius: 60% 40% 60% 40% / 50% 60% 40% 50%;
      opacity: 0;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0%   { opacity: 0; transform: translateY(0) rotate(0deg); }
      10%  { opacity: .7; }
      90%  { opacity: .5; }
      100% { opacity: 0; transform: translateY(110vh) rotate(360deg); }
    }

    .hero {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      padding: 60px 24px 40px;
      text-align: center;
    }

    .name-badge {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(3rem, 10vw, 7rem);
      color: var(--plum);
      line-height: 1;
      letter-spacing: .02em;
      display: inline-block;
      direction: ltr;
    }
    .name-badge::after {
      content: '';
      display: block;
      margin: 12px auto 0;
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .subtitle {
      margin-top: 10px;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--rose);
      direction: ltr;
    }

    .card {
      margin-top: 56px;
      background: white;
      border: 1px solid var(--mist);
      border-radius: 20px;
      padding: 52px 44px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(107,48,80,.08);
      position: relative;
    }
    .card::before {
      content: '"';
      font-family: 'Playfair Display', serif;
      font-size: 120px;
      color: var(--blush);
      position: absolute;
      top: -24px; right: 20px;
      line-height: 1;
      pointer-events: none;
    }

    .shayri {
      font-family: 'Noto Nastaliq Urdu', serif;
      font-size: clamp(1.15rem, 3.5vw, 1.45rem);
      line-height: 2.6;
      color: var(--plum);
      text-align: right;
      direction: rtl;
    }

    .sher { display: block; margin-bottom: 28px; }
    .sher:last-child { margin-bottom: 0; }
    .misra { display: block; }

    .rose-sep {
      display: block;
      font-style: normal;
      font-size: 1.1rem;
      color: var(--rose);
      margin: 4px 0 24px;
      letter-spacing: 6px;
      text-align: center;
    }

    .divider {
      margin: 36px auto;
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--rose), transparent);
    }

    .from {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--rose);
      display: block;
      text-align: center;
      direction: ltr;
    }

    .flowers { margin-top: 40px; font-size: 1.8rem; letter-spacing: 8px; }

    footer {
      position: relative; z-index: 1;
      text-align: center; padding: 20px;
      font-size: 0.75rem; color: #bba;
      direction: ltr;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      .card::before { font-size: 80px; top: -16px; }
    }
  </style>
</head>
<body>

<div class="petals" id="petals"></div>

<section class="hero">
  <h1 class="name-badge">Zunaira</h1>
  <p class="subtitle">A little something, just for you</p>

  <div class="card">
    <div class="shayri">

      <span class="sher">
        <span class="misra">زنیرا، تُو ہے روشنی کا ایک نور،</span>
        <span class="misra">جہاں بھی جائے، مہکے تیری خوشبو۔</span>
      </span>

      <span class="rose-sep">❀</span>

      <span class="sher">
        <span class="misra">تیری مسکان میں ہے سکوں کا جہاں،</span>
        <span class="misra">دلوں کو چُھولے، ایسا ہے تیرا بیاں۔</span>
      </span>

      <span class="rose-sep">❀</span>

      <span class="sher">
        <span class="misra">دوستی تیری ہے انمول تحفہ،</span>
        <span class="misra">خدا کرے، سدا خوش رہے یہ سِلسلہ۔</span>
      </span>

    </div>

    <div class="divider"></div>
    <span class="from">— with love, from your friend ✨</span>
  </div>

  <div class="flowers">🌸 🌺 🌸</div>
</section>

<footer>made with ❤️ for Zunaira</footer>

<script>
  const container = document.getElementById('petals');
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 10 + Math.random() * 12;
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${size}px;
      height: ${size * 1.4}px;
      animation-duration: ${6 + Math.random() * 8}s;
      animation-delay: ${Math.random() * 10}s;
      transform: rotate(${Math.random() * 360}deg);
      opacity: 0;
    `;
    container.appendChild(p);
  }
</script>
</body>
</html>
